<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gold" x1="120" y1="110" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0d896"/>
      <stop offset="0.5" stop-color="#d8b45a"/>
      <stop offset="1" stop-color="#a87f2e"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the OS mask never clips a corner -->
  <rect x="0" y="0" width="512" height="512" fill="url(#tile)"/>
  <!-- V scaled into the maskable safe zone (centre ~80%) -->
  <g transform="translate(256 256) scale(0.8) translate(-256 -256)"
     fill="none" stroke="url(#gold)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <path d="M158 166 L250 372 L368 138"/>
    <path d="M376 200 L368 138 L313 168"/>
  </g>
</svg>
