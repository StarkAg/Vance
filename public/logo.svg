<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gold" x1="120" y1="110" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0d896"/>
      <stop offset="0.5" stop-color="#d8b45a"/>
      <stop offset="1" stop-color="#a87f2e"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>
  <!-- tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#tile)"/>
  <rect x="17" y="17" width="478" height="478" rx="111" fill="none" stroke="#d8b45a" stroke-opacity="0.22" stroke-width="2"/>
  <!-- V that rises into an up-arrow (V-shaped recovery) -->
  <g fill="none" stroke="url(#gold)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <path d="M158 166 L250 372 L368 138"/>
